<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OGHAB VPN</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="brand-card">
        <img
          class="brand-icon"
          src="./assets/eagle-source.png"
          alt="OGHAB VPN eagle icon"
        />
        <div class="txt">
          <p>by Taktaz208</p>
        </div>
      </section>

      <section class="control-row">
        <button id="refreshBtn" class="btn btn-secondary">Refresh</button>
        <button id="connectBtn" class="btn btn-primary" disabled>
          Connect
        </button>
      </section>

      <section class="scan-control-row">
        <button id="pauseBtn" class="btn btn-secondary" type="button">
          Pause
        </button>
        <button id="stopBtn" class="btn btn-secondary" type="button">
          Stop
        </button>
      </section>

      <section class="status-card">
        <div class="status-line">
          <span>Status</span>
          <strong id="statusText">Idle</strong>
        </div>
        <div class="states-flex">
          <div class="status-line high-flex">
            <div class="status-line">
              <strong id="selectedText">--</strong>
            </div>
          </div>
          <div class="status-line">
            <span>Working</span>
            <strong id="countText">0</strong>
          </div>
          <div class="status-line">
            <span>Tested</span>
            <strong id="testedText">0 / 0</strong>
          </div>
        </div>
      </section>

      <section class="list-card">
        <div class="list-header">
          <strong id="panelTitle">Working Servers</strong>
          <span id="scanText">Ready</span>
        </div>
        <div class="panel-tabs">
          <button id="serversTabBtn" class="panel-tab active" type="button">
            Servers
          </button>
          <button id="debugTabBtn" class="panel-tab" type="button">
            Debug
          </button>
          <button id="settingsTabBtn" class="panel-tab" type="button">
            Settings
          </button>
        </div>
        <div id="serverList" class="server-list">
          <div class="empty-state">
            Refresh to fetch and test VLESS servers.
          </div>
        </div>
        <pre id="debugLog" class="debug-log hidden">
Debug output will appear here.</pre
        >
        <div id="settingsPanel" class="settings-panel hidden">
          <div class="settings-group">
            <div class="settings-header">
              <strong>Sources</strong>
              <span>GitHub raw links</span>
            </div>
            <div class="source-input-row">
              <input
                id="sourceInput"
                type="text"
                placeholder="https://raw.githubusercontent.com/..."
              />
              <button id="addSourceBtn" class="mini-btn" type="button">
                Add
              </button>
            </div>
            <div id="sourceList" class="source-list"></div>
          </div>
          <div class="settings-group">
            <div class="settings-header">
              <strong>TUN</strong>
              <span>Full system tunnel</span>
            </div>
            <label class="tun-toggle tun-toggle-wide">
              <input id="tunToggle" type="checkbox" />
              <span>Enable TUN mode</span>
            </label>
          </div>
        </div>
      </section>
    </main>

    <script src="./main.js" type="module"></script>
  </body>
</html>
